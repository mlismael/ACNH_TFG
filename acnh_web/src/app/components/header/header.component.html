<header class="custom-header w-100 m-0 p-2">
    <button (click)="toggleTheme()" class="btn-theme-toggle">
        <i class="bi" [class.bi-moon-fill]="!isDark()" [class.bi-sun-fill]="isDark()"></i>
    </button>

    <div class="row g-0 align-items-center m-0 w-100" [class.justify-content-center]="isLogin"
        [class.justify-content-between]="!isLogin">
        <div class="col-12 col-md-4 align-items-center d-flex justify-content-center">
            <a routerLink="/" class="d-flex align-items-center text-decoration-none">
                <img [src]="isDark() ? '/assets/acnh-dark-logo.png' : '/assets/acnh-light-logo_Nero_AI_Image_Upscaler_Photo.png'"
                    alt="Logo ACNH" width="120">
            </a>
        </div>

        @if (!isLogin) {
        <div class="col-12 col-md-8">
            <nav class="navbar navbar-expand-md p-0">
                <div class="container-fluid p-0 d-flex align-items-center">

                    <div
                        class="d-flex align-items-center justify-content-between w-100 w-md-auto ms-md-auto order-md-2">

                        <button class="navbar-toggler custom-toggler text-white fs-semibold" type="button"
                            data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown">
                            <span class="navbar-toggler-icon"></span>
                        </button>

                        <!-- Lógica de Sesión -->
                        @if (user$ | async; as user) {
                        <!-- Si está logueado: Desplegable con el Username -->
                        <div class="nav-item dropdown custom-user-dropdown">
                            <a class="nav-link dropdown-toggle btn btn-login-nav d-flex align-items-center text-uppercase"
                                role="button" data-bs-toggle="dropdown">
                                {{ user.username }}
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                                <li>
                                    <a class="dropdown-item" [routerLink]="['/perfil-usuario']">
                                        <i class="bi bi-person me-2"></i>Mi Perfil
                                    </a>
                                </li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li>
                                    <a class="dropdown-item" (click)="logout()" style="cursor: pointer;">
                                        <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
                                    </a>
                                </li>
                            </ul>
                        </div>
                        } @else {
                        <!-- Si no está logueado: Botón de Iniciar sesión -->
                        <a [routerLink]="['/login']" class="btn btn-login-nav">Iniciar sesión</a>
                        }
                    </div>

                    <div class="collapse navbar-collapse justify-content-center order-md-1" id="navbarNavDropdown">
                        <ul class="navbar-nav">
                            <li class="nav-item mx-3"><a class="nav-link" [routerLink]="['home']"
                                    routerLinkActive="active">Inicio</a></li>
                            <li class="nav-item mx-3"><a class="nav-link" [routerLink]="['villagers']"
                                    routerLinkActive="active">Aldeanos</a></li>
                            <li class="nav-item dropdown custom-hover-dropdown mx-3" routerLinkActive="active-parent">
                                <span class="nav-link dropdown-toggle" role="button"
                                    data-bs-toggle="dropdown">Coleccionables</span>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" [routerLink]="['bugs']"
                                            routerLinkActive="active">Bichos</a></li>
                                    <li><a class="dropdown-item" [routerLink]="['fishes']"
                                            routerLinkActive="active">Peces</a></li>
                                    <li><a class="dropdown-item" [routerLink]="['seacreatures']"
                                            routerLinkActive="active">Criaturas marinas</a></li>
                                </ul>
                            </li>
                            <li class="nav-item mx-3"><a class="nav-link" href="#">Pricing</a></li>
                        </ul>
                    </div>

                </div>
            </nav>
        </div>
        }
    </div>
</header>
